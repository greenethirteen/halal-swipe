{% if settings.google_client_id %}
<div class="google-auth">
  <span class="google-tag">⚡ Fastest way in</span>
  <div id="g_id_onload"
       data-client_id="{{ settings.google_client_id }}"
       data-login_uri="{{ settings.base_url }}/auth/google"
       data-auto_prompt="false"></div>
  <div class="g_id_signin" data-type="standard" data-theme="filled_blue"
       data-text="continue_with" data-shape="pill" data-size="large"
       data-logo_alignment="left" data-width="320"></div>
  <script src="https://accounts.google.com/gsi/client" async></script>
</div>
{% endif %}

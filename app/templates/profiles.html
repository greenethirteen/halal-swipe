{% extends "base.html" %}
{% from "components.html" import profile_card %}
{% block content %}
<section class="page-title">
  <p class="eyebrow">Search</p>
  <h1>Profiles</h1>
</section>
<form class="filters" method="get" action="/profiles">
  <input name="q" placeholder="Search education, profession, notes" value="{{ filters.q }}">
  <select name="profile_type">
    <option value="">All</option>
    <option value="Bride" {% if filters.profile_type == 'Bride' %}selected{% endif %}>Bride</option>
    <option value="Groom" {% if filters.profile_type == 'Groom' %}selected{% endif %}>Groom</option>
  </select>
  <input name="city" placeholder="City or district" value="{{ filters.city }}">
  <input name="min_age" type="number" min="18" placeholder="Min age" value="{{ filters.min_age }}">
  <input name="max_age" type="number" min="18" placeholder="Max age" value="{{ filters.max_age }}">
  <button class="button">Filter</button>
</form>
<div class="grid">
  {% for profile in profiles %}
    {{ profile_card(profile, is_subscribed) }}
  {% else %}
    <div class="empty card">No profiles match your filters.</div>
  {% endfor %}
</div>
{% endblock %}

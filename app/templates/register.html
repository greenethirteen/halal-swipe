{% extends "base.html" %}
{% block content %}
<section class="auth-card card">
  <img class="auth-logo" src="/static/logo.png" alt="{{ settings.app_name }}">
  <h1>Create account</h1>
  {% include "google_button.html" %}
  <form method="post" action="/register" class="form compact">
    <input type="hidden" name="next" value="{{ next or '/' }}">
    <input name="full_name" autocomplete="name" placeholder="Full name" required>
    <input name="email" type="email" autocomplete="email" placeholder="Email" required>
    <input name="password" type="password" minlength="8" autocomplete="new-password" placeholder="Password" required>
    <button class="button full">Create account</button>
  </form>
  <p class="auth-alt"><a href="/login{% if next and next != '/' %}?next={{ next }}{% endif %}">Log in</a></p>
</section>
{% endblock %}

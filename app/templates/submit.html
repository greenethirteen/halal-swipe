{% extends "base.html" %}
{% block content %}
<section class="page-title narrow">
  <p class="eyebrow">Upload</p>
  <h1>Submit a profile</h1>
  <p>Profiles are reviewed by an admin before appearing publicly.</p>
</section>
<form class="card form" method="post" action="/submit" enctype="multipart/form-data">
  <div class="two-col">
    <label>Profile type<select name="profile_type"><option>Bride</option><option>Groom</option></select></label>
    <label>Name <input name="full_name" placeholder="Optional or available on request"></label>
    <label>Age <input name="age" type="number" min="18" max="99"></label>
    <label>Height <input name="height" placeholder="5'3 or 160cm"></label>
    <label>City <input name="city" placeholder="Colombo, Kandy, Puttalam..."></label>
    <label>Current location <input name="district"></label>
    <label>Marital status <input name="marital_status"></label>
    <label>Education <input name="education"></label>
    <label>Profession <input name="profession"></label>
    <label>Profile image <input name="image" type="file" accept="image/png,image/jpeg,image/webp"></label>
  </div>
  <label>Family background <textarea name="family_background"></textarea></label>
  <label>Appearance / notes <textarea name="faith_notes"></textarea></label>
  <label>Expectations <textarea name="expectations"></textarea></label>
  <label>Bio summary <textarea name="bio_summary" placeholder="Write the profile in a clear, respectful tone."></textarea></label>
  <label>Contact details <textarea name="contact_details" placeholder="Only shown to subscribers."></textarea></label>
  <label class="check"><input type="checkbox" name="consent" value="yes"> I confirm this profile is submitted with permission and is for someone aged 18 or above.</label>
  <button class="button">Submit for review</button>
</form>
{% endblock %}
